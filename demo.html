<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>雨夜留白 Demo</title>
  <style>
    :root {
      --ink: #edf2f4;
      --muted: #aeb8c8;
      --warm: #f2c98b;
      --tea: #d7a96b;
      --line: rgba(255,255,255,.18);
      --panel: rgba(15, 22, 34, .76);
      --deep: #0a111c;
      --blue: #6fb7d6;
      --green: #95c6a4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 72% 14%, rgba(111, 183, 214, .14), transparent 26rem),
        linear-gradient(145deg, #07101d 0%, #121829 48%, #07101b 100%);
      overflow: hidden;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: minmax(300px, 1.1fr) minmax(320px, 430px);
      gap: clamp(16px, 3vw, 34px);
      min-height: 100vh;
      padding: clamp(18px, 3.2vw, 42px);
    }

    .room {
      position: relative;
      min-height: calc(100vh - clamp(36px, 6.4vw, 84px));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 30%),
        linear-gradient(118deg, #172238 0%, #111a2c 55%, #0b1320 100%);
      box-shadow: 0 24px 70px rgba(0,0,0,.38);
    }

    .window {
      position: absolute;
      left: 8%;
      top: 7%;
      width: min(54vw, 640px);
      height: min(48vh, 460px);
      border: 12px solid rgba(12, 17, 26, .82);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 49%, rgba(10, 16, 24, .85) 49% 51%, transparent 51%),
        linear-gradient(180deg, transparent 49%, rgba(10, 16, 24, .85) 49% 51%, transparent 51%),
        radial-gradient(circle at 70% 22%, rgba(187, 218, 238, .42), transparent 14rem),
        linear-gradient(180deg, #13243c, #07111f);
      box-shadow: inset 0 0 28px rgba(255,255,255,.06), 0 28px 44px rgba(0,0,0,.24);
    }

    .rain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(115deg, rgba(255,255,255,.34) 0 1px, transparent 1px 16px),
        linear-gradient(115deg, rgba(146,201,226,.25) 0 1px, transparent 1px 22px);
      background-size: 46px 74px, 34px 52px;
      animation: rain 1.1s linear infinite;
      opacity: .72;
    }

    @keyframes rain {
      from { background-position: 0 0, 0 0; }
      to { background-position: -46px 74px, -34px 52px; }
    }

    .lamp {
      position: absolute;
      right: 15%;
      top: 8%;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(242,201,139,.85), rgba(242,201,139,.18) 42%, transparent 70%);
      filter: blur(1px);
      transition: opacity .8s ease;
    }

    .lamp.dim { opacity: .38; }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36%;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(14, 18, 25, .95));
    }

    .table {
      position: absolute;
      left: 14%;
      bottom: 18%;
      width: min(46vw, 520px);
      height: 120px;
      border-radius: 8px 8px 28px 28px;
      background: linear-gradient(180deg, #4b3540, #2d2230);
      box-shadow: 0 28px 30px rgba(0,0,0,.24);
    }

    .tea {
      position: absolute;
      left: 12%;
      top: -34px;
      width: 72px;
      height: 54px;
      border-radius: 0 0 30px 30px;
      background: linear-gradient(180deg, #f5d7a6, #b47752);
      border: 2px solid rgba(255,255,255,.28);
      cursor: pointer;
      transition: transform .24s ease;
    }

    .tea:hover { transform: translateY(-5px); }

    .steam {
      position: absolute;
      left: 22px;
      top: -42px;
      width: 7px;
      height: 38px;
      border-radius: 50%;
      border-left: 2px solid rgba(255,255,255,.34);
      animation: steam 2.2s ease-in-out infinite;
    }

    .steam:nth-child(2) {
      left: 42px;
      animation-delay: .5s;
    }

    @keyframes steam {
      0%, 100% { opacity: .2; transform: translateY(8px); }
      50% { opacity: .8; transform: translateY(-6px); }
    }

    .album {
      position: absolute;
      left: 33%;
      top: -44px;
      width: 168px;
      height: 96px;
      border-radius: 8px;
      background: linear-gradient(135deg, #9b695f, #6a4248);
      border: 1px solid rgba(255,255,255,.18);
      transform: rotate(-4deg);
      cursor: pointer;
      transition: transform .24s ease;
    }

    .album:hover { transform: rotate(-2deg) translateY(-4px); }

    .photo {
      position: absolute;
      left: 24px;
      top: 17px;
      width: 82px;
      height: 58px;
      border: 5px solid rgba(250,250,245,.9);
      background:
        linear-gradient(rgba(255,255,255,.62), rgba(255,255,255,.62)),
        radial-gradient(circle at 36% 35%, #5b677c 0 9px, transparent 10px),
        radial-gradient(circle at 62% 38%, #697088 0 8px, transparent 9px),
        linear-gradient(180deg, #a7b4c6, #526174);
      filter: blur(.2px) saturate(.7);
    }

    .cover {
      position: absolute;
      inset: 9px 9px 9px 112px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(255,255,255,.24);
      border-radius: 6px;
      color: rgba(255,255,255,.64);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
    }

    .mio {
      position: absolute;
      right: 16%;
      bottom: 25%;
      width: 150px;
      height: 250px;
    }

    .head {
      position: absolute;
      left: 36px;
      top: 0;
      width: 82px;
      height: 90px;
      border-radius: 45% 45% 48% 48%;
      background: linear-gradient(180deg, #f0c7b2, #d99c8f);
      box-shadow: inset 0 -12px 0 rgba(103, 57, 74, .15);
    }

    .hair {
      position: absolute;
      left: 18px;
      top: -10px;
      width: 112px;
      height: 116px;
      border-radius: 52% 52% 42% 42%;
      background: linear-gradient(160deg, #2b334a, #111725);
      box-shadow: inset -16px -16px 0 rgba(255,255,255,.04);
    }

    .face {
      position: absolute;
      left: 47px;
      top: 36px;
      width: 58px;
      height: 44px;
      z-index: 2;
    }

    .eye {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 9px;
      border-radius: 50%;
      background: #273041;
      box-shadow: 0 1px 0 rgba(255,255,255,.4);
    }

    .mouth {
      width: 18px;
      height: 8px;
      margin: 14px auto 0;
      border-bottom: 2px solid #764c55;
      border-radius: 50%;
    }

    .body {
      position: absolute;
      left: 31px;
      top: 86px;
      width: 94px;
      height: 154px;
      border-radius: 42px 42px 16px 16px;
      background: linear-gradient(180deg, #52647a, #2f3d57);
      box-shadow: inset 0 16px 0 rgba(255,255,255,.06);
    }

    .reflection {
      position: absolute;
      left: 6%;
      bottom: 7%;
      color: rgba(255,255,255,.28);
      font-size: 13px;
    }

    .panel {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      min-height: calc(100vh - clamp(36px, 6.4vw, 84px));
      padding: clamp(18px, 2.6vw, 28px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(0,0,0,.34);
    }

    .title {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 650;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .dialogue {
      min-height: 170px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      line-height: 1.75;
      font-size: 16px;
    }

    .speaker {
      display: block;
      margin-bottom: 8px;
      color: var(--warm);
      font-size: 13px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255,255,255,.07);
      cursor: pointer;
      text-align: left;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .choice:hover, .choice:focus-visible {
      transform: translateY(-1px);
      background: rgba(111, 183, 214, .18);
      border-color: rgba(111, 183, 214, .72);
      outline: none;
    }

    .memory {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .chip {
      min-height: 58px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      font-size: 12px;
      line-height: 1.35;
    }

    .chip strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 560;
    }

    .note {
      display: none;
      gap: 8px;
    }

    .note.visible {
      display: grid;
    }

    .note input {
      width: 100%;
      min-height: 46px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(0,0,0,.22);
      outline: none;
    }

    .note input:focus {
      border-color: rgba(149, 198, 164, .82);
    }

    .footer {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .bookmark {
      position: absolute;
      left: 68%;
      top: -28px;
      width: 28px;
      height: 72px;
      background: linear-gradient(180deg, var(--blue), #396681);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .4s ease, transform .4s ease;
    }

    .bookmark.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .boat {
      position: absolute;
      left: 22%;
      bottom: 8%;
      width: 90px;
      height: 46px;
      background: linear-gradient(140deg, #eef4f1, #b7c9c9);
      clip-path: polygon(0 42%, 48% 0, 100% 42%, 78% 100%, 20% 100%);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .boat.visible {
      opacity: .9;
      transform: translateY(0);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { margin-left: 0; }
      50% { margin-left: 12px; }
    }

    @media (max-width: 860px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .room, .panel {
        min-height: 620px;
      }
      .window {
        width: 78%;
        height: 260px;
      }
      .table {
        width: 72%;
      }
      .mio {
        right: 8%;
        transform: scale(.86);
        transform-origin: bottom right;
      }
      .memory {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="room" aria-label="雨夜房间">
      <div class="window"><div class="rain"></div></div>
      <div class="lamp" id="lamp"></div>
      <div class="floor"></div>
      <div class="table">
        <div class="tea" id="tea" title="碰一碰热茶"><span class="steam"></span><span class="steam"></span></div>
        <div class="album" id="album" title="看看相册">
          <div class="photo"></div>
          <div class="cover">未解释的<br>老照片</div>
        </div>
        <div class="bookmark" id="bookmark" title="未命名的照片"></div>
      </div>
      <div class="boat" id="boat" title="给明天的小纸船"></div>
      <div class="mio" aria-hidden="true">
        <div class="hair"></div>
        <div class="head"></div>
        <div class="face"><span class="eye"></span><span class="eye"></span><div class="mouth"></div></div>
        <div class="body"></div>
      </div>
      <div class="reflection" id="reflection">窗外雨声很轻。你可以什么都不做。</div>
    </section>

    <aside class="panel">
      <header>
        <h1 class="title">雨夜留白</h1>
        <p class="subtitle">一个安静、观察力敏锐的 AI 角色，在用户疲惫的雨夜里选择少说一点，但把关心放进环境和选择里。</p>
      </header>

      <section class="dialogue" aria-live="polite">
        <span class="speaker" id="speaker">澪</span>
        <div id="line">你来了。外面雨有点大，我把灯调暗了。</div>
      </section>

      <section class="choices" id="choices"></section>

      <section class="note" id="note">
        <input id="noteInput" maxlength="48" placeholder="不用完整，只写一个词也可以。">
        <button class="choice" id="sendNote">把便签夹进相册</button>
      </section>

      <section class="memory" aria-label="角色记忆">
        <div class="chip"><strong>夜间出现</strong>最近常在 0 点后打开 App</div>
        <div class="chip"><strong>一句疲惫</strong>上周说过“最近有点累”</div>
        <div class="chip"><strong>老照片</strong>发过照片，但没有解释是谁</div>
      </section>

      <footer class="footer" id="footer">设计重点：主动观察，但不审问；记得细节，但把解释权留给用户。</footer>
    </aside>
  </main>

  <script>
    const line = document.querySelector("#line");
    const speaker = document.querySelector("#speaker");
    const choices = document.querySelector("#choices");
    const note = document.querySelector("#note");
    const noteInput = document.querySelector("#noteInput");
    const sendNote = document.querySelector("#sendNote");
    const lamp = document.querySelector("#lamp");
    const bookmark = document.querySelector("#bookmark");
    const boat = document.querySelector("#boat");
    const reflection = document.querySelector("#reflection");
    const footer = document.querySelector("#footer");
    const tea = document.querySelector("#tea");
    const album = document.querySelector("#album");

    const state = {
      quiet: false,
      photoTouched: false
    };

    function setLine(text, who = "澪") {
      speaker.textContent = who;
      line.textContent = text;
    }

    function setChoices(items) {
      choices.innerHTML = "";
      note.classList.remove("visible");
      items.forEach(item => {
        const button = document.createElement("button");
        button.className = "choice";
        button.textContent = item.label;
        button.addEventListener("click", item.action);
        choices.appendChild(button);
      });
    }

    function introChoices() {
      setChoices([
        { label: "坐一会儿", action: sitTogether },
        { label: "聊两句", action: talkSoftly },
        { label: "今天不想说话", action: stayQuiet }
      ]);
    }

    function sitTogether() {
      lamp.classList.add("dim");
      reflection.textContent = "时钟声变小了，桌上的茶还冒着一点热气。";
      setLine("我发现你最近常在很晚的时候来。不是提醒，只是……如果今晚也很累，可以把这里当成不用解释的地方。");
      setChoices([
        { label: "嗯，有点累", action: tired },
        { label: "只是想看看你", action: justVisit },
        { label: "看看桌上的相册", action: photoScene }
      ]);
    }

    function talkSoftly() {
      setLine("那我说得慢一点。今晚不问你发生了什么，我们先听一会儿雨。");
      footer.textContent = "澪没有追问原因，只降低互动密度，让用户先落地。";
      setChoices([
        { label: "我最近确实睡得很晚", action: tired },
        { label: "那张照片还在吗", action: photoScene },
        { label: "给明天留一句话", action: makeBoat }
      ]);
    }

    function stayQuiet() {
      state.quiet = true;
      setLine("好。我在。你不用回我。");
      reflection.textContent = "房间没有新的任务，只有雨声和微暗的灯。";
      footer.textContent = "沉默也是一种有效输入，系统不把它误判成冷场。";
      setChoices([
        { label: "留雨声 10 分钟", action: rainOnly },
        { label: "把照片先盖着", action: coverPhoto },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function tired() {
      setLine("那今晚我们不做需要用力的事。任务我先收起来，你只要选一个很轻的动作。");
      footer.textContent = "把关心落到系统变化上：减少任务，而不是增加说教。";
      setChoices([
        { label: "雨声陪伴 5 分钟", action: rainOnly },
        { label: "整理那张老照片", action: photoScene },
        { label: "写给明天的一句话", action: makeBoat }
      ]);
    }

    function justVisit() {
      setLine("嗯。那我把相册放近一点，也把热茶留在这里。你想碰哪个都可以，不碰也可以。");
      setChoices([
        { label: "碰一碰热茶", action: touchTea },
        { label: "看看相册", action: photoScene },
        { label: "坐到雨停", action: rainOnly }
      ]);
    }

    function touchTea() {
      tea.style.transform = "translateY(-8px) rotate(-2deg)";
      setLine("还暖着。我没有放太甜，因为你上次只喝了一半。");
      reflection.textContent = "杯沿有一点雾气，像是被提前等着。";
      setChoices([
        { label: "谢谢", action: () => setLine("不用谢。今晚已经够辛苦了。") },
        { label: "看看相册", action: photoScene },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function photoScene() {
      state.photoTouched = true;
      album.style.transform = "rotate(-1deg) translateY(-8px)";
      setLine("前几天那张照片，我放在这里了。你没有说它是谁，所以我也没有猜。");
      footer.textContent = "关键边界：记忆可以被看见，但解释权不被夺走。";
      setChoices([
        { label: "先盖着吧", action: coverPhoto },
        { label: "我想讲一点", action: writeNote },
        { label: "帮我收好", action: lockPhoto }
      ]);
    }

    function coverPhoto() {
      bookmark.classList.add("visible");
      setLine("好。它可以只是放在这里，不一定要被打开。");
      reflection.textContent = "相册合上了，蓝色书签露出一点边。";
      setChoices([
        { label: "给它起名：未命名的照片", action: unnamedPhoto },
        { label: "给明天留一句话", action: makeBoat },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function unnamedPhoto() {
      setLine("我记下这个名字。等你想说的时候，我们再从这里开始。");
      footer.textContent = "共同痕迹形成了，但没有强迫用户补全故事。";
      setChoices([
        { label: "留雨声 10 分钟", action: rainOnly },
        { label: "写给明天的一句话", action: makeBoat },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function writeNote() {
      setLine("可以。不用完整，只写一个词也可以。");
      choices.innerHTML = "";
      note.classList.add("visible");
      noteInput.focus();
    }

    sendNote.addEventListener("click", () => {
      const value = noteInput.value.trim();
      note.classList.remove("visible");
      if (value) {
        setLine("我只记你愿意留下的这一点。剩下的，我们不急。");
        reflection.textContent = `便签上写着：“${value}”`;
      } else {
        setLine("空白也可以夹进去。它说明今晚你来过。");
        reflection.textContent = "相册里夹进了一张空白便签。";
      }
      setChoices([
        { label: "给明天留一句话", action: makeBoat },
        { label: "留雨声 10 分钟", action: rainOnly },
        { label: "关灯", action: lightsOut }
      ]);
    });

    function lockPhoto() {
      album.style.opacity = ".72";
      bookmark.classList.add("visible");
      setLine("我帮你收好。只有你点开时，我才会再提起它。");
      reflection.textContent = "抽屉轻轻合上，没有提示音。";
      setChoices([
        { label: "谢谢你没有问", action: () => setLine("因为那是你的照片，不是我的谜题。") },
        { label: "给明天留一句话", action: makeBoat },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function makeBoat() {
      boat.classList.add("visible");
      setLine("雨停之前，给明天留一点东西吧。很小的就行。我会放在窗边。");
      footer.textContent = "让今晚的情绪变成明天还能看见的物件。";
      setChoices([
        { label: "明天醒来先喝水", action: boatDone },
        { label: "明早把房间调成暖灯", action: warmMorning },
        { label: "先不写了", action: rainOnly }
      ]);
    }

    function boatDone() {
      setLine("我记下了。明天见到它的时候，你不用从今晚重新开始。");
      reflection.textContent = "小纸船在窗边轻轻晃着。";
      setChoices([
        { label: "留雨声 10 分钟", action: rainOnly },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function warmMorning() {
      lamp.classList.remove("dim");
      setLine("好。明早我会把光调暖一点，不催你，只让房间先醒过来。");
      reflection.textContent = "灯光比刚才暖了一点。";
      setChoices([
        { label: "留雨声 10 分钟", action: rainOnly },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function rainOnly() {
      setLine("我把雨声留小一点。你不用回我。");
      reflection.textContent = "雨声被留在背景里，像一条很慢的呼吸。";
      setChoices([
        { label: "再坐一会儿", action: sitTogether },
        { label: "关灯", action: lightsOut }
      ]);
    }

    function lightsOut() {
      lamp.classList.add("dim");
      document.body.style.background = "linear-gradient(145deg, #030812 0%, #090d16 56%, #02050a 100%)";
      setLine("今晚已经够了。");
      reflection.textContent = "窗边只剩下一点雨光。";
      setChoices([
        { label: "重新开始体验", action: resetDemo }
      ]);
    }

    function resetDemo() {
      document.body.style.background = "";
      lamp.classList.remove("dim");
      bookmark.classList.remove("visible");
      boat.classList.remove("visible");
      album.style.opacity = "";
      album.style.transform = "";
      tea.style.transform = "";
      reflection.textContent = "窗外雨声很轻。你可以什么都不做。";
      footer.textContent = "设计重点：主动观察，但不审问；记得细节，但把解释权留给用户。";
      setLine("你来了。外面雨有点大，我把灯调暗了。");
      introChoices();
    }

    tea.addEventListener("click", touchTea);
    album.addEventListener("click", photoScene);
    introChoices();
  </script>
</body>
</html>
